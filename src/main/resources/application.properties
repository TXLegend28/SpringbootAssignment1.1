spring.application.name=SpringbootAssignment1.1

# ====================== SERVER PORT (your request) ======================
server.port=8082

# ====================== XAMPP MySQL Connection ======================
spring.datasource.url=jdbc:mysql://localhost:3306/ufh_cs_courses?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional: nice logs
logging.level.org.springframework=INFO
